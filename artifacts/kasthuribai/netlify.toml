[build]
  base    = "."
command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/kasthuribai run build"
  publish = "artifacts/kasthuribai/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH     = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
